# PPE Compliance Detection System Configuration

# Model Configuration
model:
  weights_path: "models/trained/best.pt"
  person_model_path: "yolov8n.pt"
  person_confidence_threshold: 0.35
  confidence_threshold: 0.5
  iou_threshold: 0.4
  device: "cpu"   # change to "cuda" if GPU available
  class_confidence_thresholds:
    helmet: 0.6
    vest: 0.5
    without_helmet: 0.5
    without_vest: 0.5
  min_box_area_ratio: 0.0025
  max_box_area_ratio: 0.08
  min_box_width_ratio: 0.03
  min_box_height_ratio: 0.03
  helmet_upper_region_ratio: 0.65
  helmet_head_region_ratio: 0.25
  helmet_min_aspect_ratio: 0.5
  helmet_max_aspect_ratio: 2.0
  helmet_min_intensity: 75.0
  helmet_temporal_frames: 3
  temporal_iou_threshold: 0.3

# Classes (MUST match data.yaml)
classes:
  helmet: 0
  vest: 1
  without_helmet: 2
  without_vest: 3

# Violation Logic Configuration
violation:
  violation_classes:
    - without_helmet
    - without_vest
  person_ppe_iou_threshold: 0.01
  person_center_margin: 0.05
  enable_person_fallback: false

# Storage Configuration
storage:
  violations_dir: "violations"
  log_file: "violations/violations_log.json"
  save_violations: true
  image_format: "jpg"

# Dashboard Configuration
dashboard:
  title: "PPE Compliance Detection System"
  page_icon: "🦺"
  layout: "wide"
  max_video_fps: 30

# Visualization
visualization:
  bbox_thickness: 2
  text_size: 0.6
  colors:
    person: [255, 255, 255]
    helmet: [0, 255, 0]
    vest: [0, 255, 255]
    without_helmet: [0, 0, 255]
    without_vest: [255, 0, 0]
